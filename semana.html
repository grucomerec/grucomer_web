<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Materiales de la Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container my-5">

  <h2 id="tituloSemana" class="mb-4"></h2>

  <!-- Loader -->
  <div id="loading" class="d-flex justify-content-center my-4">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>

  <div id="linksContainer" class="row"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const curso = params.get("curso");   // ID del curso (ej: 1A)
    const semana = params.get("semana"); // Número de semana

    const DASHBOARD_SCRIPT_URL = "TU_URL_DEL_SCRIPT/exec";
    const API_KEY = "MI_API_KEY_SECRETO"; // mismo que en Apps Script
    const ORIGIN = "https://grucomerec.github.io";

    if (!curso || !semana) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("linksContainer").innerHTML = 
        "<p class='text-danger'>Faltan parámetros en la URL.</p>";
      throw new Error("Parámetros curso/semana faltantes");
    }

    fetch(`${DASHBOARD_SCRIPT_URL}?action=getLinks&curso=${curso}&semana=${semana}&origin=${ORIGIN}&key=${API_KEY}`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("loading").style.display = "none"; // ocultar loader

        if (data.success) {
          // Mostrar ID + Nombre del curso
          document.getElementById("tituloSemana").textContent = 
            `Materiales ${curso} – ${data.curso} – Semana ${data.semana}`;

          const container = document.getElementById("linksContainer");
          container.innerHTML = "";

          if (data.links.length > 0) {
            data.links.forEach(linkObj => {
              const col = document.createElement("div");
              col.className = "col-md-6 col-lg-4 mb-4";

              const card = document.createElement("div");
              card.className = "card h-100";

              const header = document.createElement("div");
              header.className = "card-header text-white";

              // Colores según semana
              switch (data.semana) {
                case "1": header.classList.add("bg-success"); break;
                case "2": header.classList.add("bg-primary"); break;
                case "3": header.classList.add("bg-warning"); header.classList.remove("text-white"); break;
                case "4": header.classList.add("bg-danger"); break;
                default: header.classList.add("bg-info");
              }

              header.textContent = linkObj.nombre || "Recurso";

              const body = document.createElement("div");
              body.className = "card-body";

              const a = document.createElement("a");
              a.href = linkObj.url;
              a.target = "_blank";
              a.className = "btn btn-outline-dark w-100";
              a.textContent = "Acceder";

              body.appendChild(a);
              card.appendChild(header);
              card.appendChild(body);
              col.appendChild(card);
              container.appendChild(col);
            });
          } else {
            container.innerHTML = "<p class='text-danger'>No hay materiales disponibles.</p>";
          }
        } else {
          document.getElementById("linksContainer").innerHTML = "<p class='text-danger'>Error al cargar materiales.</p>";
        }
      })
      .catch(err => {
        document.getElementById("loading").style.display = "none";
        console.error(err);
        document.getElementById("linksContainer").innerHTML = "<p class='text-danger'>Error al cargar materiales.</p>";
      });
  </script>

</body>
</html>
