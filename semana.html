<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Materiales de la Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container my-5">

  <h2 id="tituloSemana"></h2>
  <div id="linksContainer" class="mt-4"></div>

  <script>
    // Obtener parámetros de la URL
    const params = new URLSearchParams(window.location.search);
    const cursoId = params.get("cursoId");
    const semana = params.get("semana");

    document.getElementById("tituloSemana").textContent = 
      `Materiales Curso ${cursoId} - Semana ${semana}`;

    // URL del Web App de Apps Script
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNF60EBEZYpreXeuzJG3Y2VfzTBEtsDcuiwEfr4lhxAfKkuxvDziU-bgDXtYJ53UOMhg/exec";

    // Token secreto y dominio permitido
    const TOKEN = "grucomer2026//planificacion//segura//2026";
    const ORIGIN = window.location.origin;

    // Llamada al backend
    fetch(`${SCRIPT_URL}?cursoId=${cursoId}&semana=${semana}&token=${TOKEN}&origin=${encodeURIComponent(ORIGIN)}`)
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("linksContainer");
        if (data.success && data.data.length > 0) {
          data.data.forEach(item => {
            const card = document.createElement("div");
            card.className = "card mb-3";

            const body = document.createElement("div");
            body.className = "card-body";

            const title = document.createElement("h5");
            title.className = "card-title";
            title.textContent = item.descripcion;

            const linkBtn = document.createElement("a");
            linkBtn.href = item.link;
            linkBtn.target = "_blank";
            linkBtn.className = "btn btn-outline-primary mt-2";
            linkBtn.textContent = "Acceder al recurso";

            body.appendChild(title);
            body.appendChild(linkBtn);
            card.appendChild(body);
            container.appendChild(card);
          });
        } else {
          container.innerHTML = "<p class='text-danger'>No hay materiales disponibles.</p>";
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById("linksContainer").innerHTML = 
          "<p class='text-danger'>Error al cargar materiales.</p>";
      });
  </script>

</body>
</html>
