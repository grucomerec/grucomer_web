<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Materiales de la Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container my-5">

  <h2 id="tituloSemana"></h2>
  <div id="linksContainer" class="mt-4"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const curso = params.get("curso");
    const semana = params.get("semana");

    const DASHBOARD_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx07AJj0uWaG2kVEI1_LQpOOvYHmg-7hp6fYJ9PZ0FzFwEp9VuuXdoo98gIT2g7sEbGAg/exec";

    fetch(`${DASHBOARD_SCRIPT_URL}?action=getLinks&curso=${curso}&semana=${semana}&apiKey=${encodeURIComponent("grucomer/dashboard/2026")}&origin=${encodeURIComponent(window.location.origin)}`)
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          document.getElementById("tituloSemana").textContent = `Materiales ${data.curso} - Semana ${data.semana}`;
          const container = document.getElementById("linksContainer");

          if (data.links.length > 0) {
            data.links.forEach(linkObj => {
              const a = document.createElement("a");
              a.href = linkObj.url;
              a.target = "_blank";
              a.className = "btn btn-outline-primary d-block mb-2";
              a.textContent = linkObj.nombre;
              container.appendChild(a);
            });
          } else {
            container.innerHTML = "<p class='text-danger'>No hay materiales disponibles.</p>";
          }
        } else {
          document.getElementById("linksContainer").innerHTML = "<p class='text-danger'>Error al cargar materiales.</p>";
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById("linksContainer").innerHTML = "<p class='text-danger'>Error al cargar materiales.</p>";
      });
  </script>

</body>
</html>
