<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Materiales de la Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container my-5">

  <h2 id="tituloSemana" class="mb-4"></h2>
  <div id="linksContainer" class="row"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const curso = params.get("curso");
    const semana = params.get("semana");

    const DASHBOARD_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmSr1uaNQFvuwRmk0q4UBDF5HBnbBcL_j151rxmrvNo8USYlk4glZPYsmNXYBz3ceWrQ/exec";

    fetch(`${DASHBOARD_SCRIPT_URL}?action=getLinks&curso=${curso}&semana=${semana}`)
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          document.getElementById("tituloSemana").textContent = 
            `Materiales ${data.curso} - Semana ${data.semana}`;
          const container = document.getElementById("linksContainer");

          if (data.links.length > 0) {
            data.links.forEach(linkObj => {
              const col = document.createElement("div");
              col.className = "col-md-6 col-lg-4 mb-4";

              const card = document.createElement("div");
              card.className = "card h-100";

              const header = document.createElement("div");
              header.className = "card-header bg-info text-white";
              header.textContent = linkObj.nombre;

              const body = document.createElement("div");
              body.className = "card-body";

              const a = document.createElement("a");
              a.href = linkObj.url;
              a.target = "_blank";
              a.className = "btn btn-primary w-100";
              a.textContent = "Acceder";

              body.appendChild(a);
              card.appendChild(header);
              card.appendChild(body);
              col.appendChild(card);
              container.appendChild(col);
            });
          } else {
            container.innerHTML = "<p class='text-danger'>No hay materiales disponibles.</p>";
          }
        } else {
          document.getElementById("linksContainer").innerHTML = "<p class='text-danger'>Error al cargar materiales.</p>";
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById("linksContainer").innerHTML = "<p class='text-danger'>Error al cargar materiales.</p>";
      });
  </script>

</body>
</html>
