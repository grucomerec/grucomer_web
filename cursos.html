<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🎓 Aula Virtual - Cursos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .week-card { transition: all 0.3s; }
    .week-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="container my-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Bienvenido, <span id="nombreEstudiante" class="text-primary"></span></h2>
    <button onclick="logout()" class="btn btn-outline-danger">Cerrar Sesión</button>
  </div>

  <!-- Curso 1A -->
  <section id="1A" style="display:none">
    <h3 class="mb-4">Materiales Curso 1A</h3>
    <div class="row">
      <div class="col-md-6 col-lg-4 mb-4">
        <div class="card week-card h-100">
          <div class="card-header bg-success text-white">Semana 1</div>
          <div class="card-body">
            <a href="ENLACE_DRIVE_1A_SEMANA1" target="_blank" class="btn btn-primary w-100">Acceder</a>
          </div>
        </div>
      </div>
      <!-- Repite para Semana 2, 3, 4 -->
    </div>
  </section>

  <!-- Curso 2B -->
  <section id="2B" style="display:none">
    <h3 class="mb-4">Materiales Curso 2B</h3>
    <div class="row">
      <div class="col-md-6 col-lg-4 mb-4">
        <div class="card week-card h-100">
          <div class="card-header bg-info text-white">Semana 1</div>
          <div class="card-body">
            <a href="ENLACE_DRIVE_2B_SEMANA1" target="_blank" class="btn btn-primary w-100">Acceder</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Curso 3B -->
  <section id="3B" style="display:none">
    <h3 class="mb-4">Materiales Curso 3B</h3>
    <div class="row">
      <div class="col-md-6 col-lg-4 mb-4">
        <div class="card week-card h-100">
          <div class="card-header bg-warning text-dark">Semana 1</div>
          <div class="card-body">
            <a href="ENLACE_DRIVE_3B_SEMANA1" target="_blank" class="btn btn-primary w-100">Acceder</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Curso 4B -->
  <section id="4B" style="display:none">
    <h3 class="mb-4">Materiales Curso 4B</h3>
    <div class="row">
      <div class="col-md-6 col-lg-4 mb-4">
        <div class="card week-card h-100">
          <div class="card-header bg-danger text-white">Semana 1</div>
          <div class="card-body">
            <a href="ENLACE_DRIVE_4B_SEMANA1" target="_blank" class="btn btn-primary w-100">Acceder</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const nombre = localStorage.getItem("nombreEstudiante");
    const cursos = localStorage.getItem("cursoEstudiante");

    if (!nombre || !cursos) {
      window.location.href = "aula.html";
    }

    document.getElementById("nombreEstudiante").textContent = nombre;

    const listaCursos = cursos.split(",").map(c => c.trim());
    listaCursos.forEach(cursoId => {
      const section = document.getElementById(cursoId);
      if (section) {
        section.style.display = "block";
      }
    });

    function logout() {
      localStorage.clear();
      window.location.href = "aula.html";
    }
  </script>

</body>
</html>
