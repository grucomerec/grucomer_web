<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🎓 Aula Virtual - Cursos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .course-card { margin-bottom: 2rem; }
    .week-card { transition: all 0.3s; }
    .week-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="container my-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Bienvenido, <span id="nombreEstudiante" class="text-primary"></span></h2>
    <button onclick="logout()" class="btn btn-outline-danger">Cerrar Sesión</button>
  </div>

  <!-- Curso 1A -->
  <div id="1A" class="card course-card" style="display:none">
    <div class="card-header bg-primary text-white">
      Materiales Curso 1A
    </div>
    <div class="card-body">
      <div class="row">
        <div class="col-md-6 col-lg-3 mb-4">
          <div class="card week-card h-100">
            <div class="card-header bg-success text-white">Semana 1</div>
            <div class="card-body">
              <!-- Redirección con parámetros -->
              <a href="semana.html?curso=1A&semana=1" class="btn btn-primary w-100">Acceder</a>
            </div>
          </div>
        </div>
        <div class="col-md-6 col-lg-3 mb-4">
          <div class="card week-card h-100">
            <div class="card-header bg-success text-white">Semana 2</div>
            <div class="card-body">
              <a href="semana.html?curso=1A&semana=2" class="btn btn-primary w-100">Acceder</a>
            </div>
          </div>
        </div>
        <!-- Repite para Semana 3 y 4 -->
      </div>
    </div>
  </div>

  <!-- Curso 4B -->
  <div id="4B" class="card course-card" style="display:none">
    <div class="card-header bg-primary text-white">
      Materiales Curso 4B
    </div>
    <div class="card-body">
      <div class="row">
        <div class="col-md-6 col-lg-3 mb-4">
          <div class="card week-card h-100">
            <div class="card-header bg-danger text-white">Semana 1</div>
            <div class="card-body">
              <a href="semana.html?curso=4B&semana=1" class="btn btn-primary w-100">Acceder</a>
            </div>
          </div>
        </div>
        <!-- Repite para Semana 2, 3, 4 -->
      </div>
    </div>
  </div>

  <!-- Puedes añadir más cursos (2B, 3B) con la misma estructura -->

  <script>
    const nombre = localStorage.getItem("nombreEstudiante");
    const cursos = localStorage.getItem("cursoEstudiante");

    if (!nombre || !cursos) {
      window.location.href = "aula.html";
    }

    document.getElementById("nombreEstudiante").textContent = nombre;

    const listaCursos = cursos.split(",").map(c => c.trim());
    listaCursos.forEach(cursoId => {
      const section = document.getElementById(cursoId);
      if (section) {
        section.style.display = "block";
      }
    });

    function logout() {
      localStorage.clear();
      window.location.href = "aula.html";
    }
  </script>

</body>
</html>
