<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Control - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container my-5">

  <h2 class="mb-4">📊 Panel de Control</h2>

  <!-- Selección de curso y semana -->
  <div class="row mb-4">
    <div class="col-md-4">
      <label class="form-label">ID del Curso</label>
      <select id="cursoSelect" class="form-select">
        <option value="1A">1A</option>
        <option value="2B">2B</option>
        <option value="3B">3B</option>
        <option value="4B">4B</option>
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Nombre del Curso</label>
      <input type="text" id="nombreCurso" class="form-control" placeholder="Ej: Electricidad básica" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">Semana</label>
      <select id="semanaSelect" class="form-select">
        <option value="1">Semana 1</option>
        <option value="2">Semana 2</option>
        <option value="3">Semana 3</option>
        <option value="4">Semana 4</option>
      </select>
    </div>
  </div>

  <!-- Formulario para añadir recurso -->
  <form id="dashboardForm" class="mb-4">
    <div class="mb-3">
      <input type="text" id="desc" class="form-control" placeholder="Descripción">
    </div>
    <div class="mb-3">
      <input type="url" id="link" class="form-control" placeholder="https://docs.google.com/...">
    </div>
    <div class="form-check mb-3">
      <input type="checkbox" id="visible" class="form-check-input">
      <label class="form-check-label" for="visible">Mostrar a estudiantes</label>
    </div>
    <button type="submit" class="btn btn-success">Añadir recurso</button>
  </form>

  <!-- Tabla de recursos -->
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>ID Curso</th>
        <th>Nombre Curso</th>
        <th>Semana</th>
        <th>Descripción</th>
        <th>Link</th>
        <th>Visible</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaRecursos"></tbody>
  </table>

  <script>
    const DASHBOARD_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwy1TBjk27ZhxLgYWYvQC3F0FN27gS7kuzU_G2XHY5YlrBl3ilEQc2X5pO74ffjE46J/exec"; // reemplaza con tu URL de despliegue

    // Añadir recurso
    document.getElementById("dashboardForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = {
        action: "addLink",
        cursoId: document.getElementById("cursoSelect").value,
        cursoNombre: document.getElementById("nombreCurso").value.trim(),
        semana: document.getElementById("semanaSelect").value,
        descripcion: document.getElementById("desc").value.trim(),
        link: document.getElementById("link").value.trim(),
        estado: document.getElementById("visible").checked ? "si" : "no"
      };
      await fetch(DASHBOARD_SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
      cargarRecursos();
    });

    // Cargar recursos
    async function cargarRecursos() {
      const curso = document.getElementById("cursoSelect").value;
      const semana = document.getElementById("semanaSelect").value;
      const resp = await fetch(`${DASHBOARD_SCRIPT_URL}?action=getLinks&curso=${curso}&semana=${semana}`);
      const data = await resp.json();
      const tbody = document.getElementById("tablaRecursos");
      tbody.innerHTML = "";
      data.links.forEach((linkObj, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${curso}</td>
          <td>${data.curso}</td>
          <td>${data.semana}</td>
          <td>${linkObj.nombre}</td>
          <td><a href="${linkObj.url}" target="_blank">Ver</a></td>
          <td><input type="checkbox" ${linkObj.estado === "si" ? "checked" : ""} onchange="toggleEstado('${curso}','${semana}',${index},this.checked)"></td>
          <td><button class="btn btn-danger btn-sm" onclick="eliminarRecurso('${curso}','${semana}',${index})">Eliminar</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function toggleEstado(curso, semana, index, visible) {
      const data = { action: "updateEstado", curso, semana, index, estado: visible ? "si" : "no" };
      await fetch(DASHBOARD_SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
      cargarRecursos();
    }

    async function eliminarRecurso(curso, semana, index) {
      const data = { action: "deleteLink", curso, semana, index };
      await fetch(DASHBOARD_SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
      cargarRecursos();
    }

    // Cargar al inicio
    cargarRecursos();
  </script>

</body>
</html>
