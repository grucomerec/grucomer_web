<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🎓 Aula Virtual - Login</title>
  <link rel="stylesheet" href="aula.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
 <section class="container mt-4 pt-5">
     <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Grucomer Home</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link active" href="aula.html">Aula Virtual</a></li>
                </ul>
            </div>
        </div>
     </nav>
    </section>

  <section id="loginSection" class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-header bg-primary text-white text-center">
            <h4>Ingreso al Aula Virtual</h4>
          </div>
          <div class="card-body">
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-control" id="usuario" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="clave" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Ingresar</button>
            </form>
            <div id="errorMsg" class="text-danger text-center mt-3" style="display:none;"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzcqNFf192xKACP7nFR2BB32ZwAH1Nc3Y_iqDLYXz2-wZWJFOB5ihsSvn3GIXb9zhE3ow/exec";  
    const ALLOWED_ORIGIN = window.location.origin; 

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const usuario = document.getElementById('usuario').value.trim().toLowerCase();
      const clave = document.getElementById('clave').value.trim();
      const errorMsg = document.getElementById('errorMsg');

      if (!usuario || !clave) {
        errorMsg.textContent = "Por favor ingresa usuario y contraseña";
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const url = `${SCRIPT_URL}?usuario=${encodeURIComponent(usuario)}&clave=${encodeURIComponent(clave)}&apiKey=${encodeURIComponent("grucomer/mayo/2026@andaruti_1999")}&origin=${encodeURIComponent(ALLOWED_ORIGIN)}`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.success === true) {
          // Guardar datos en localStorage
          localStorage.setItem("nombreEstudiante", data.nombre);
          localStorage.setItem("cursoEstudiante", data.curso);

          // Redirigir a cursos.html
          window.location.href = "cursos.html";
        } else {
          errorMsg.textContent = data.motivo === "negado" 
            ? "Acceso denegado por el administrador" 
            : (data.error || "Usuario o contraseña incorrectos");
          errorMsg.style.display = 'block';
          setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
        }
      } catch (error) {
        console.error("Error de fetch:", error);
        errorMsg.textContent = "Error de conexión. Inténtalo más tarde.";
        errorMsg.style.display = 'block';
        setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
      }
    });
  </script>

  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <div class="container">
    <p>&copy; 2026 Grucomer Ec - Todos los derechos reservados.</p>
  </div>
</footer>
</body>
</html>
