<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🎓 Aula Virtual - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <section id="loginSection" class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-header bg-primary text-white text-center">
            <h4>Ingreso al Aula Virtual</h4>
          </div>
          <div class="card-body">
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-control" id="usuario" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="clave" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Ingresar</button>
            </form>
            <div id="errorMsg" class="text-danger text-center mt-3" style="display:none;"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>


    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-4FX8t1nnSWPVtwZ_ALcGqfaVNtSLXYY-XrGiTm-JAPE5mZaduwRbTaaNY5bmG1qHyQ/exec";  
    const ALLOWED_ORIGIN = window.location.origin; 



    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const usuario = document.getElementById('usuario').value.trim().toLowerCase();
      const clave = document.getElementById('clave').value.trim();
      const errorMsg = document.getElementById('errorMsg');

      if (!usuario || !clave) {
        errorMsg.textContent = "Por favor ingresa usuario y contraseña";
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const url = `${SCRIPT_URL}?usuario=${encodeURIComponent(usuario)}&clave=${encodeURIComponent(clave)}&apiKey=${encodeURIComponent("grucomer/mayo/2026@andaruti_1999")}&origin=${encodeURIComponent(ALLOWED_ORIGIN)}`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.success === true) {
          // Guardar datos en localStorage
          localStorage.setItem("nombreEstudiante", data.nombre);
          localStorage.setItem("cursoEstudiante", data.curso);

          // Redirigir a cursos.html
          window.location.href = "cursos.html";
        } else {
          errorMsg.textContent = data.motivo === "negado" 
            ? "Acceso denegado por el administrador" 
            : (data.error || "Usuario o contraseña incorrectos");
          errorMsg.style.display = 'block';
          setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
        }
      } catch (error) {
        console.error("Error de fetch:", error);
        errorMsg.textContent = "Error de conexión. Inténtalo más tarde.";
        errorMsg.style.display = 'block';
        setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
      }
    });
  </script>

</body>
</html>
