<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual</title>
    <link rel="stylesheet" href="aula.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .aula-content { display: none; }
        .week-card { transition: all 0.3s; }
        .week-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <!-- Navbar (tu código original) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">Mi Aula Virtual</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link active" href="aula.html">Aula Virtual</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Login -->
    <section id="loginSection" class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4>Ingreso al Aula Virtual</h4>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Usuario</label>
                                <input type="text" class="form-control" id="usuario" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="clave" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                        </form>
                        <div id="errorMsg" class="text-danger text-center mt-3" style="display:none;">Usuario o contraseña incorrectos</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Aula Virtual -->
    <section id="aulaContent" class="aula-content container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Bienvenido, <span id="nombreEstudiante" class="text-primary"></span></h2>
            <button onclick="logout()" class="btn btn-outline-danger">Cerrar Sesión</button>
        </div>

        <h3 class="mb-4">Materiales por Semana</h3>

        <div class="row">
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card week-card h-100">
                    <div class="card-header bg-success text-white">Semana 1</div>
                    <div class="card-body">
                        <a href="TU_ENLACE_DRIVE_SEMANA1" target="_blank" class="btn btn-primary w-100">Acceder a materiales</a>
                    </div>
                </div>
            </div>
            <!-- Repite para Semana 2, 3 y 4 -->
        </div>
    </section>

    <script>
    // ==================== CONFIGURACIÓN ====================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAz-m_P3xMTc4sptLfcHUFvNyKcxxV3bSWCmdngOq2KmNe_5b4XOcHcbobp1_YWbaeQg/exec";  
    // ← Pega aquí tu URL real del Apps Script (la que termina en /exec)

// ==================== LOGIN ====================

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const usuario = document.getElementById('usuario').value.trim().toLowerCase();
    const clave = document.getElementById('clave').value.trim();
    const errorMsg = document.getElementById('errorMsg');

    if (!usuario || !clave) {
        errorMsg.textContent = "Por favor ingresa usuario y contraseña";
        errorMsg.style.display = 'block';
        return;
    }

    try {
        const url = `${SCRIPT_URL}?usuario=${encodeURIComponent(usuario)}&clave=${encodeURIComponent(clave)}&apiKey=${encodeURIComponent("grucomer/mayo/2026@andaruti_1999")}`;
        
        const response = await fetch(url);
        const data = await response.json();

        if (data.success === true) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('aulaContent').style.display = 'block';
            document.getElementById('nombreEstudiante').textContent = `Bienvenido ${data.nombre} al curso ${data.curso}`;
        } else {
            errorMsg.textContent = data.motivo === "negado" 
                ? "Acceso denegado por el administrador" 
                : "Usuario o contraseña incorrectos";
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
        }
    } catch (error) {
        console.error("Error de fetch:", error);
        errorMsg.textContent = "Error de conexión. Inténtalo más tarde.";
        errorMsg.style.display = 'block';
        setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
    }
});

</script>

<footer class="bg-dark text-white text-center py-3">
    <p>&copy; 2026 Grucomer Ec - Todos los derechos reservados</p>
</footer>

</body>
</html>
